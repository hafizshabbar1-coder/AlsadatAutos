<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL-SADAT AUTO - Business Management & POS</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- App Container -->
  <div id="app-container" class="app-layout hidden">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fa-solid fa-gears logo-icon"></i>
          <span>AL-SADAT AUTO</span>
        </div>
        <button id="sidebar-toggle-btn" class="sidebar-toggle-btn">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#/sales" class="nav-item" data-page="sales">
          <i class="fa-solid fa-cash-register nav-icon"></i>
          <span>Sales & POS</span>
        </a>
        <a href="#/products" class="nav-item" data-page="products">
          <i class="fa-solid fa-boxes-stacked nav-icon"></i>
          <span>Products</span>
        </a>
        <a href="#/purchases" class="nav-item" data-page="purchases">
          <i class="fa-solid fa-truck-ramp-box nav-icon"></i>
          <span>Purchases</span>
        </a>
        <a href="#/returns" class="nav-item" data-page="returns">
          <i class="fa-solid fa-rotate-left nav-icon"></i>
          <span>Sales Return</span>
        </a>
        <a href="#/customers" class="nav-item" data-page="customers">
          <i class="fa-solid fa-users nav-icon"></i>
          <span>Customer Ledger</span>
        </a>
        <a href="#/suppliers" class="nav-item" data-page="suppliers">
          <i class="fa-solid fa-handshake nav-icon"></i>
          <span>Supplier Ledger</span>
        </a>
        <a href="#/salary" class="nav-item" data-page="salary">
          <i class="fa-solid fa-hand-holding-dollar nav-icon"></i>
          <span>Expenses & Salaries</span>
        </a>
        <a href="#/reports" class="nav-item" data-page="reports">
          <i class="fa-solid fa-chart-pie nav-icon"></i>
          <span>Reports & Analytics</span>
        </a>
        <a href="#/settings" class="nav-item" data-page="settings">
          <i class="fa-solid fa-sliders nav-icon"></i>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="sidebar-user-avatar">AD</div>
          <div class="user-details">
            <span class="user-name" id="sidebar-user-name">Loading...</span>
            <span class="user-role" id="sidebar-user-role">Administrator</span>
          </div>
        </div>
        <button id="logout-btn" class="logout-btn" title="Logout">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-wrapper">
      <!-- Topbar Header -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="mobile-menu-btn" class="mobile-menu-btn">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h1 class="page-title" id="current-page-title">Sales & POS</h1>
        </div>
        <div class="topbar-right">
          <div class="live-clock" id="live-clock">
            <i class="fa-regular fa-clock"></i>
            <span id="clock-time">00:00:00</span>
          </div>
          <div class="divider"></div>
          <div class="business-badge" id="topbar-business-name">AL-SADAT AUTO</div>
        </div>
      </header>

      <!-- Dynamic Page Container -->
      <div id="page-content" class="page-content fade-in">
        <!-- Dynamic content injected here -->
      </div>
    </main>
  </div>

  <!-- Auth Layout Container -->
  <div id="auth-container" class="auth-layout hidden">
    <!-- Auth page content injected here -->
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Global Modals Container -->
  <div id="modal-container" class="modal-overlay hidden">
    <div id="modal-content" class="modal-card">
      <!-- Dynamic modal injected here -->
    </div>
  </div>

  <!-- Application Bootstrap -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
